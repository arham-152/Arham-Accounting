<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#111318" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo-app.png" />
    <link rel="apple-touch-icon" href="/logo-app.png" />
    <title>Account</title>
    <script>
      // Protection for the read-only 'fetch' property in AI Studio environment
      (function() {
        if (typeof window.fetch === 'function') {
          const originalFetch = window.fetch;
          try {
            // Define a property with a no-op setter to prevent "getter-only" TypeErrors
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn("An external library tried to overwrite 'fetch'. This operation was intercepted to prevent a crash.");
              },
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // If the environment has already locked 'fetch' beyond redefinition, 
            // we have to hope that the Vite aliases for polyfills are catching it.
            console.error("Critical environment lock: Unable to redefine 'fetch' property.", e);
          }
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Static Splash Screen - shown instantly while JS loads -->
      <style>
        body { margin: 0; padding: 0; background-color: #0a0c10; }
        #static-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 24px;
          background-color: #0a0c10;
          color: #64748b;
          font-family: 'JetBrains Mono', 'Courier New', monospace;
          z-index: 9999;
        }
        .static-logo {
          height: 128px;
          width: auto;
          object-fit: contain;
          image-rendering: -webkit-optimize-contrast;
        }
        .static-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid #1f2430;
          border-top: 4px solid #f0b429;
          border-radius: 50%;
          animation: static-spin 1s linear infinite;
        }
        @keyframes static-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .static-text {
          font-size: 10px;
          text-transform: uppercase;
          letter-spacing: 4px;
          color: #64748b;
        }
      </style>
      <div id="static-loader">
        <img src="/logo-dark.png" class="static-logo" alt="Account">
        <div class="static-spinner"></div>
        <div class="static-text">Initializing Systems...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
